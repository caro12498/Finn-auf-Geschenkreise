<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Finns Abenteuerurlaub</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

#game { margin: 15px; }

canvas {
  display: none;
  margin: auto;
  border: 3px solid #222;
}

.choice {
  display: inline-block;
  margin: 15px;
  padding: 12px;
  background: #2c2c3e;
  border-radius: 10px;
  cursor: pointer;
}

.choice:hover {
  background: #3a3a55;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🏝️ Finns Abenteuerurlaub</h1>

<div id="game"></div>
<canvas id="canvas" width="700" height="300"></canvas>

<script>
const gameDiv = document.getElementById("game");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let bike = "";
let y = 220;
let speedY = 0;
let jump = false;
let animationId = null;

// ---------- INTRO ----------
function showIntro() {
  canvas.style.display = "none";

  gameDiv.innerHTML = `
    <h2>🎁 Finns Abenteuer beginnt</h2>
    <p>Finn hat von seinen Freunden einen Trip geschenkt gekriegt.</p>
    <p>Ein Urlaub voller Überraschungen, Entscheidungen und Abenteuer wartet auf ihn.</p>
    <p><strong>Er muss viele Dinge erleben und selbst entscheiden, wie seine Reise verläuft.</strong></p>
    <br>
    <button onclick="startLevel1()">➡️ Reise starten</button>
  `;
}

// ---------- STOP GAME ----------
function stopGame() {
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
}

// ---------- LEVEL 1 ----------
function startLevel1() {
  stopGame();
  canvas.style.display = "none";

  gameDiv.innerHTML = `
    <h2>🚲 Start</h2>
    <p>Welches Fahrrad soll Finn nehmen?</p>

    <div class="choice" onclick="chooseBike('Rennrad')">🚴 Rennrad</div>
    <div class="choice" onclick="chooseBike('Mountainbike')">🚵 Mountainbike</div>
    <div class="choice" onclick="chooseBike('E-Bike')">⚡ E-Bike</div>
  `;
}

function chooseBike(type) {
  bike = type;
  gameDiv.innerHTML = `<p>Finn fährt los mit seinem ${type} 🚴</p>`;
  setTimeout(startLevel2, 1200);
}

// ---------- LEVEL 2 ----------
function startLevel2() {
  stopGame();

  gameDiv.innerHTML = "<p>➡️ Tippen / Klick / SPACE = Springen</p>";
  canvas.style.display = "block";

  let obstacles = [];
  for (let i = 0; i < 10; i++) {
    obstacles.push({ x: 700 + i * 220, h: 20 + Math.random()*30 });
  }

  let xFinn = 80;
  let waveOffset = 0;

  function drawBackground() {
    ctx.fillStyle = "#87ceeb";
    ctx.fillRect(0,0,700,300);

    ctx.fillStyle = "#1e90ff";
    ctx.beginPath();
    ctx.moveTo(0,180);
    for (let i=0;i<700;i++){
      let wave = Math.sin((i+waveOffset)*0.02)*5;
      ctx.lineTo(i,180+wave);
    }
    ctx.lineTo(700,300);
    ctx.lineTo(0,300);
    ctx.fill();

    ctx.fillStyle="#5c4033";
    ctx.beginPath();
    ctx.moveTo(400,180);
    ctx.lineTo(500,80);
    ctx.lineTo(600,180);
    ctx.fill();
  }

  function drawFinn() {
    ctx.fillStyle="#2ecc71";
    ctx.fillRect(xFinn,y-40,30,40);

    ctx.fillStyle="#f1c27d";
    ctx.beginPath();
    ctx.arc(xFinn+15,y-50,10,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#6b3e26";
    ctx.fillRect(xFinn+5,y-60,20,8);
    ctx.fillRect(xFinn+7,y-45,16,6);

    ctx.fillStyle = bike==="Rennrad"?"#ff4d4d":
                    bike==="Mountainbike"?"#333":"#4da6ff";

    ctx.beginPath();
    ctx.arc(xFinn+5,y,8,0,Math.PI*2);
    ctx.arc(xFinn+25,y,8,0,Math.PI*2);
    ctx.fill();
  }

  function drawObstacle(x,h){
    ctx.fillStyle="#444";
    ctx.beginPath();
    ctx.moveTo(x,230);
    ctx.lineTo(x+20,230-h);
    ctx.lineTo(x+40,230);
    ctx.fill();
  }

  function loop(){
    ctx.clearRect(0,0,700,300);

    drawBackground();
    ctx.fillStyle="#3d2b1f";
    ctx.fillRect(0,230,700,70);

    drawFinn();

    waveOffset+=2;

    for(let o of obstacles){
      o.x-=4;
      drawObstacle(o.x,o.h);

      if (xFinn < o.x+40 && xFinn+30 > o.x && y>200){
        speedY = -6;
      }
    }

    if(jump){ speedY=-10; jump=false; }
    y+=speedY;
    speedY+=0.5;
    if(y>220){ y=220; speedY=0; }

    animationId = requestAnimationFrame(loop);

    if(obstacles[obstacles.length-1].x < -50){
      stopGame();
      setTimeout(startLevel3,1200);
    }
  }

  window.onkeydown = e=>{
    if(e.code==="Space" && y===220) jump=true;
  };

  canvas.onclick = ()=>{ if(y===220) jump=true; };
  canvas.ontouchstart = ()=>{ if(y===220) jump=true; };

  loop();
}

// ---------- LEVEL 3 ----------
function startLevel3() {
  stopGame();
  canvas.style.display="none";

  gameDiv.innerHTML = `
    <h2>🍽️ Essen</h2>
    <p>Finn hat riesigen Hunger!</p>
    <p><strong>Was soll er essen?</strong></p>

    <div class="choice" onclick="chooseFood('Burger')">🍔 Burger</div>
    <div class="choice" onclick="chooseFood('Pasta')">🍝 Pasta</div>
    <div class="choice" onclick="chooseFood('Tapas')">🍤 Tapas</div>
  `;
}

function chooseFood(food){
  gameDiv.innerHTML=`<p>Finn genießt ${food} 😋</p>`;
  setTimeout(startLevel4,1200);
}

// ---------- LEVEL 4 ----------
function startLevel4(){
  gameDiv.innerHTML=`
    <h2>🌊 Überfahrt</h2>
    <p><strong>Finn fährt von Fuerteventura nach Lanzarote</strong></p>

    <div class="choice" onclick="chooseBoat('Speedboat')">🚤 Speedboat</div>
    <div class="choice" onclick="chooseBoat('Kanu')">🛶 Kanu</div>
    <div class="choice" onclick="chooseBoat('Fähre')">🛳️ Fähre</div>
  `;
}

function chooseBoat(boat){
  gameDiv.innerHTML=`<p>Finn fährt mit dem ${boat} 🌊</p>`;
  setTimeout(startLevel5,1500);
}

// ---------- LEVEL 5 ----------
function startLevel5(){
  gameDiv.innerHTML=`
    <h2>💆‍♂️ Massage</h2>
    <p>Welche Massage soll Finn nehmen?</p>

    <div class="choice" onclick="chooseMassage('Thai-Massage')">🧘 Thai-Massage</div>
    <div class="choice" onclick="chooseMassage('Hot Stone')">🔥 Hot Stone</div>
    <div class="choice" onclick="chooseMassage('Lomi Lomi')">🌊 Lomi Lomi</div>
  `;
}

function chooseMassage(type){
  gameDiv.innerHTML=`<p>Finn genießt eine ${type} 😌</p>`;
  setTimeout(startFinalQuestion,1500);
}

// ---------- FINAL ----------
function startFinalQuestion(){
  gameDiv.innerHTML=`
    <h2>🤔 Wie war der Urlaub?</h2>

    <div class="choice" onclick="endGame()">a) Unvergesslich</div>
    <div class="choice" onclick="endGame()">b) Dermaßen geil</div>
    <div class="choice" onclick="endGame()">c) Hat alles gegeben</div>
  `;
}

function endGame(){
  gameDiv.innerHTML=`
    <h2>🎉 Ende</h2>
    <p>Finn hatte den perfekten Urlaub 😎</p>
  `;
}

// Start mit Intro
showIntro();
</script>

</body>
</html>
