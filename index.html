<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finns Abenteuer</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ccecff;
        text-align: center;
    }
    #gameCanvas {
        display: none;
        margin: 0 auto;
        background: linear-gradient(#b0e3ff, #ffffff);
        border: 4px solid #4CAF50;
        border-radius: 12px;
    }
    #sceneBox {
        max-width: 460px;
        margin: 30px auto;
        background: white;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 0 12px rgba(0,0,0,0.3);
    }
    #sceneBox img {
        width: 260px;
        border-radius: 8px;
    }
    button {
        margin-top: 15px;
        padding: 14px;
        width: 100%;
        max-width: 300px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>🌴 Finns Fuerteventura Abenteuer 🇮🇪</h1>

<!-- Story Szenen -->
<div id="sceneBox">
    <h2 id="sceneTitle">Start</h2>
    <p id="sceneText">Finn ist bereit für ein großes Abenteuer.</p>
    <img id="sceneImg" src="[files.use.ai](https://files.use.ai/files/chat%2Ffiles%2Fb2a33e40-1787-4fad-92a3-0bc1c4041fa6-43a240b3-360a-4b1a-a0bf-eb2f2c94520d-1777037416946-0.png)">
    <br>
    <button onclick="startJumpLevel(1)">▶️ Abenteuer starten</button>
</div>

<!-- Jump Game -->
<canvas id="gameCanvas" width="360" height="600"></canvas>

<script>
// -------------------------------
// GLOBALS
// -------------------------------
let level = 1;
let gameRunning = false;

// Placeholder Finn graphics (werden später ersetzt)
const finnSide = "[files.use.ai](https://files.use.ai/files/chat%2Ffiles%2Fb2a33e40-1787-4fad-92a3-0bc1c4041fa6-43a240b3-360a-4b1a-a0bf-eb2f2c94520d-1777037416946-0.png)";
const finnBike = "[media.giphy.com](https://media.giphy.com/media/l0Ex8GsPPE1z3LbyQ/giphy.gif)";
const finnMassage = "[media.giphy.com](https://media.giphy.com/media/LRpLY0rQ7qOuc/giphy.gif)";
const finnBoat = "[media.giphy.com](https://media.giphy.com/media/8YutMatqkTfSE/giphy.gif)";
const finnEat = "[media.giphy.com](https://media.giphy.com/media/pHO4pKTJnU6LM/giphy.gif)";

// -------------------------------
// STORY: Zeigt Szenen zwischen Levels
// -------------------------------
function showScene(title, text, img, callbackText, callbackFn) {
    document.getElementById("gameCanvas").style.display = "none";
    document.getElementById("sceneBox").style.display = "block";

    document.getElementById("sceneTitle").innerText = title;
    document.getElementById("sceneText").innerText = text;
    document.getElementById("sceneImg").src = img;
    document.querySelector("#sceneBox button").innerText = callbackText;
    document.querySelector("#sceneBox button").onclick = callbackFn;
}

// -------------------------------
// STORY + LEVEL REIHENFOLGE
// -------------------------------
function startJumpLevel(n) {
    level = n;
    document.getElementById("sceneBox").style.display = "none";
    document.getElementById("gameCanvas").style.display = "block";
    startGame();
}

function afterLevel(level) {
    if (level == 1) {
        showScene(
            "🚴 Fahrrad",
            "Finn fährt entspannt an der Küste entlang.",
            finnBike,
            "Weiterfahren",
            () => startJumpLevel(2)
        );
    }
    if (level == 2) {
        showScene(
            "💆 Massage",
            "Finn entspannt sich nach dem wilden Springen.",
            finnMassage,
            "Weiter",
            () => startJumpLevel(3)
        );
    }
    if (level == 3) {
        showScene(
            "⛴ Bootsfahrt",
            "Ein frischer Wind, Wellen und gute Laune!",
            finnBoat,
            "Auf zum Abendessen",
            () => showEnding()
        );
    }
}

function showEnding() {
    showScene(
        "🍽 Abendessen am Strand",
        "Finn genießt ein perfektes Essen bei Sonnenuntergang. Danke für dieses wunderbare Geschenk!",
        finnEat,
        "Nochmal spielen",
        () => location.reload()
    );
}

// -------------------------------
// JUMP GAME (Doodle Jump Style)
// -------------------------------
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 150,
    y: 300,
    w: 60,
    h: 70,
    vy: 0,
    gravity: 0.4,
    jumpForce: -10,
    movingLeft: false,
    movingRight: false
};

let platforms = [];

function generatePlatforms() {
    platforms = [];
    for (let i = 0; i < 7; i++) {
        platforms.push({
            x: Math.random() * 280,
            y: i * 90,
            w: 80,
            h: 10
        });
    }
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") player.movingLeft = true;
    if (e.key === "ArrowRight") player.movingRight = true;
});
document.addEventListener("keyup", e => {
    if (e.key === "ArrowLeft") player.movingLeft = false;
    if (e.key === "ArrowRight") player.movingRight = false;
});

const sprite = new Image();
sprite.src = finnSide;

function startGame() {
    gameRunning = true;
    player.x = 150;
    player.y = 300;
    player.vy = 0;
    generatePlatforms();
    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (player.movingLeft)  player.x -= 4;
    if (player.movingRight) player.x += 4;

    if (player.x < -60) player.x = canvas.width;
    if (player.x > canvas.width) player.x = -60;

    player.vy += player.gravity;
    player.y += player.vy;

    for (let p of platforms) {
        if (
            player.vy > 0 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h > p.y &&
            player.y + player.h < p.y + 20
        ) {
            player.vy = player.jumpForce;
        }
    }

    if (player.y < 200) {
        let diff = 200 - player.y;
        player.y = 200;
        platforms.forEach(p => p.y += diff);
    }

    for (let p of platforms) {
        if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * 280;
        }
    }

    ctx.fillStyle = "#2e7d32";
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });

    ctx.drawImage(sprite, player.x, player.y, player.w, player.h);

    if (player.y > canvas.height) {
        gameRunning = false;
        afterLevel(level);
        return;
    }

    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
