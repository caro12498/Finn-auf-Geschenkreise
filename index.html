<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finns Abenteuer auf Fuerteventura</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
        background-size: cover;
        background-position: center;
        text-align: center;
        transition: background-image 0.5s ease;
    }

    #overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(255,255,255,0.55);
        pointer-events: none;
    }

    #game {
        background: white;
        max-width: 450px;
        margin: auto;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 0 12px rgba(0,0,0,0.25);
    }

    h1 { margin-top: 0; }

    #scene img {
        width: 240px;
        margin-top: 10px;
    }

    #progress {
        font-size: 14px;
        color: #555;
        margin-bottom: 8px;
    }

    #bar-bg {
        height: 6px;
        background: #ddd;
        border-radius: 4px;
        margin-bottom: 10px;
    }

    #bar {
        height: 6px;
        width: 0%;
        background: #4CAF50;
        border-radius: 4px;
        transition: width 0.3s;
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #4CAF50;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover { background: #45a049; }

</style>
</head>
<body>

<div id="overlay"></div>

<h1>🌴 Finn auf Fuerteventura 🇮🇪</h1>

<div id="game">
    <div id="progress">Start</div>
    <div id="bar-bg"><div id="bar"></div></div>

    <p id="text">Finn ist bereit für sein Abenteuer. Bereit?</p>

    <div id="scene">
        <!-- Cartoon-Finn – modern, braune Haare, Bart, Irland-Shirt -->
        <img src="[files.openpix.ai](https://files.openpix.ai/finn-standing-demo.png)" alt="Finn" />
    </div>

    <div id="choices">
        <button onclick="nextScene()">▶️ Starten</button>
    </div>
</div>

<script>
let step = 0;

const backgrounds = {
    start: "[images.unsplash.com](https://images.unsplash.com/photo-1507525428034-b723cf961d3e)",
    bike:  "[images.unsplash.com](https://images.unsplash.com/photo-1500530855697-b586d89ba3ee)",
    spa:   "[images.unsplash.com](https://images.unsplash.com/photo-1556228724-4c181bd3a8f5)",
    boat:  "[images.unsplash.com](https://images.unsplash.com/photo-1500375592092-40eb2168fd21)",
    food:  "[images.unsplash.com](https://images.unsplash.com/photo-1517248135467-4c7edcad34c4)",
    end:   "[images.unsplash.com](https://images.unsplash.com/photo-1507525428034-b723cf961d3e)"
};

const finnStanding = "[files.openpix.ai](https://files.openpix.ai/finn-standing-demo.png)";
const finnBike     = "[files.openpix.ai](https://files.openpix.ai/finn-bike-demo.gif)";
const finnSpa      = "[files.openpix.ai](https://files.openpix.ai/finn-massage-demo.gif)";
const finnBoat     = "[files.openpix.ai](https://files.openpix.ai/finn-boat-demo.gif)";
const finnEat      = "[files.openpix.ai](https://files.openpix.ai/finn-eat-demo.gif)";

function setBG(type) {
    document.body.style.backgroundImage = `url('${backgrounds[type]}')`;
}

function nextScene() {
    step++;
    const text    = document.getElementById("text");
    const scene   = document.getElementById("scene");
    const choices = document.getElementById("choices");
    const bar     = document.getElementById("bar");
    const progress= document.getElementById("progress");

    bar.style.width = (step/5 * 100) + "%";

    if (step === 1) {
        setBG("bike");
        progress.textContent = "1 / 4 🚴";
        text.textContent = "Finn setzt sich auf das Fahrrad und schaut in Richtung Küste.";
        scene.innerHTML = `<img src="${finnBike}" alt="Finn fährt Fahrrad">`;
        choices.innerHTML = `<button onclick="playAction('bike')">🚴‍♂️ Losfahren</button>`;
    }

    else if (step === 2) {
        setBG("spa");
        progress.textContent = "2 / 4 💆";
        text.textContent = "Nach der Tour gönnt sich Finn eine Massage.";
        scene.innerHTML = `<img src="${finnSpa}" alt="Massage">`;
        choices.innerHTML = `<button onclick="playAction('spa')">💆 Entspannen</button>`;
    }

    else if (step === 3) {
        setBG("boat");
        progress.textContent = "3 / 4 🚤";
        text.textContent = "Finn steigt aufs Boot – bereit für Lanzarote!";
        scene.innerHTML = `<img src="${finnBoat}" alt="Bootsfahrt">`;
        choices.innerHTML = `<button onclick="playAction('boat')">⛴ Ablegen</button>`;
    }

    else if (step === 4) {
        setBG("food");
        progress.textContent = "4 / 4 🍽";
        text.textContent = "Am Abend genießt Finn ein leckeres Essen.";
        scene.innerHTML = `<img src="${finnEat}" alt="Finn isst">`;
        choices.innerHTML = `<button onclick="playAction('food')">🍝 Essen servieren</button>`;
    }

    else if (step === 5) {
        setBG("end");
        progress.textContent = "Ende 🎉";

        const endings = [
            "🌅 Finn genießt den Sonnenuntergang und denkt: Was für ein wunderschönes Geschenk!",
            "🌴 Glücklich blickt Finn aufs Meer – dieser Urlaub war einfach perfekt.",
            "💚 Mit Sonne im Herzen sagt Finn: Danke für dieses unvergessliche Geschenk!",
            "✨ Finn fühlt sich frei, leicht und dankbar. Eine Traumreise!"
        ];

        const final = endings[Math.floor(Math.random() * endings.length)];

        text.textContent = final;
        scene.innerHTML = `<img src="${finnStanding}" alt="Finn">`;
        choices.innerHTML = `<button onclick="restart()">🔄 Nochmal spielen</button>`;
    }
}

function playAction(type) {
    const text  = document.getElementById("text");
    const choices = document.getElementById("choices");

    choices.innerHTML = ""; 

    if (type === "bike") text.textContent = "Finn fährt los, der Wind weht, er lacht glücklich!";
    if (type === "spa")  text.textContent = "Finn entspannt komplett – pure Ruhe.";
    if (type === "boat") text.textContent = "Wellen spritzen, Sonne scheint, Finn genießt jede Sekunde!";
    if (type === "food") text.textContent = "Das Essen schmeckt fantastisch – perfekter Abend.";

    setTimeout(() => nextScene(), 2600);
}

function restart() {
    step = 0;
    const text    = document.getElementById("text");
    const scene   = document.getElementById("scene");
    const choices = document.getElementById("choices");
    const bar     = document.getElementById("bar");
    const progress= document.getElementById("progress");

    setBG("start");
    bar.style.width = "0%";
    progress.textContent = "Start";

    text.textContent = "Finn ist bereit für sein Abenteuer. Bereit?";
    scene.innerHTML = `<img src="${finnStanding}" alt="Finn">`;
    choices.innerHTML = `<button onclick="nextScene()">▶️ Starten</button>`;
}

setBG("start");
</script>

</body>
</html>
