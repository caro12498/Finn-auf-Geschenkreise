<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finn auf Fuerteventura</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        transition: background-image 0.6s ease;
        color: #222;
    }

    #overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(255,255,255,0.55);
        pointer-events: none;
    }

    h1 { margin-bottom: 10px; }

    #game {
        max-width: 440px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.25);
        position: relative;
    }

    #scene img {
        width: 230px;
        margin-top: 10px;
    }

    button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background: #4CAF50;
        color: white;
        cursor: pointer;
        transition: background 0.2s;
    }

    button:hover { background: #45a049; }

    #progress {
        font-size: 14px;
        margin-bottom: 10px;
        color: gray;
    }

    #bar-bg {
        height: 6px;
        background: #ddd;
        border-radius: 5px;
        margin-bottom: 10px;
    }

    #bar {
        height: 6px;
        background: #4CAF50;
        width: 0%;
        border-radius: 5px;
        transition: width 0.3s;
    }
</style>
</head>
<body>

<div id="overlay"></div>

<h1>🌴 Finn auf Fuerteventura 🇮🇪</h1>

<div id="game">
    <div id="progress">Start</div>
    <div id="bar-bg"><div id="bar"></div></div>
    <p id="text">Finn steht am Flughafen – bereit für den Urlaub seines Lebens!</p>
    <div id="scene"></div>
    <div id="choices"></div>
</div>

<script>
let step = 0;

// leichte Hintergrundbilder pro Szene
const backgrounds = {
    start:       "[images.unsplash.com](https://images.unsplash.com/photo-1507525428034-b723cf961d3e)",
    biking:      "[images.unsplash.com](https://images.unsplash.com/photo-1500530855697-b586d89ba3ee)",
    wellness:    "[images.unsplash.com](https://images.unsplash.com/photo-1556228724-4c181bd3a8f5)",
    boat:        "[images.unsplash.com](https://images.unsplash.com/photo-1500375592092-40eb2168fd21)",
    food:        "[images.unsplash.com](https://images.unsplash.com/photo-1517248135467-4c7edcad34c4)",
    ending:      "[images.unsplash.com](https://images.unsplash.com/photo-1507525428034-b723cf961d3e)"
};

// Finns Figur – Irland-Trikot, braune Haare (symbolisch)
const finnImage = "[raw.githubusercontent.com](https://raw.githubusercontent.com/ItsFinn/graphics/main/finn_ireland.png)";

function setBackground(scene) {
    document.body.style.backgroundImage = `url('${backgrounds[scene]}')`;
}

// Szenenlogik
function nextScene() {
    step++;
    const text = document.getElementById("text");
    const scene = document.getElementById("scene");
    const choices = document.getElementById("choices");
    const progress = document.getElementById("progress");
    const bar = document.getElementById("bar");

    bar.style.width = (step / 5 * 100) + "%";

    if (step === 1) {
        setBackground("biking");
        progress.innerText = "1 / 4 🚴‍♂️";
        text.innerText = "Finn holt sein Fahrrad heraus und schaut Richtung Berge.";
        scene.innerHTML = `<img src="${finnImage}" alt="Finn" /><br>
                           <img src="[media.giphy.com](https://media.giphy.com/media/LmNwrBhejkK9EFP504/giphy.gif)" alt="Radfahren">`;
        choices.innerHTML = `<button onclick="playAction('bike')">🚴 Finn fährt los!</button>`;
    }

    else if (step === 2) {
        setBackground("wellness");
        progress.innerText = "2 / 4 💆";
        text.innerText = "Nach dem Radeln gönnt sich Finn Entspannung.";
        scene.innerHTML = `<img src="${finnImage}" alt="Finn">
                           <img src="[media.giphy.com](https://media.giphy.com/media/LRpLY0rQ7qOuc/giphy.gif)" alt="Massage">`;
        choices.innerHTML = `<button onclick="playAction('wellness')">💆‍♂️ Massage starten</button>`;
    }

    else if (step === 3) {
        setBackground("boat");
        progress.innerText = "3 / 4 🚤";
        text.innerText = "Zeit für ein Abenteuer auf dem Meer!";
        scene.innerHTML = `<img src="${finnImage}" alt="Finn">
                           <img src="[media.giphy.com](https://media.giphy.com/media/8YutMatqkTfSE/giphy.gif)" alt="Bootsfahrt">`;
        choices.innerHTML = `<button onclick="playAction('boat')">⛴ Finn legt ab</button>`;
    }

    else if (step === 4) {
        setBackground("food");
        progress.innerText = "4 / 4 🍽";
        text.innerText = "Nach einem spannenden Tag sitzt Finn im Restaurant.";
        scene.innerHTML = `<img src="${finnImage}" alt="Finn">
                           <img src="[media.giphy.com](https://media.giphy.com/media/pHO4pKTJnU6LM/giphy.gif)" alt="Essen">`;
        choices.innerHTML = `<button onclick="playAction('food')">🍝 Finn bestellt sein Essen</button>`;
    }

    else if (step === 5) {
        setBackground("ending");
        progress.innerText = "Ende 🎉";
        bar.style.width = "100%";

        const endings = [
            "🌞 Finn sitzt bei Sonnenuntergang am Meer und denkt: Was für eine wunderbare Zeit! Danke an alle, die dieses Geschenk möglich gemacht haben!",
            "🌴 Mit einem breiten Lächeln schaut Finn auf die Wellen – dankbar für die schönen Erinnerungen und die Sonne im Herzen.",
            "💖 Finn fühlt sich glücklich, erholt und voller Energie. Diese Reise war das schönste Geburtstagsgeschenk – Danke euch allen!",
            "🏖 Er atmet tief die warme Meeresluft ein und weiß: Das war etwas ganz Besonderes."
        ];
        const randomEnding = endings[Math.floor(Math.random() * endings.length)];

        text.innerText = randomEnding;
        scene.innerHTML = `<img src="${finnImage}" alt="Finn">`;
        choices.innerHTML = `<button onclick="restart()">🔄 Nochmal spielen</button>`;
    }
}

// Animationen bzw. Aktionen
function playAction(action) {
    const text = document.getElementById("text");
    const scene = document.getElementById("scene");
    const choices = document.getElementById("choices");

    choices.innerHTML = ""; // Knöpfe ausblenden, während Aktion läuft

    if (action === "bike") {
        text.innerText = "Finn fährt los, spürt den warmen Wind im Gesicht und genießt die Freiheit!";
    }
    else if (action === "wellness") {
        text.innerText = "Finn schließt die Augen – Ruhe, Entspannung, Wohlbefinden.";
    }
    else if (action === "boat") {
        text.innerText = "Das Boot wiegt sanft auf den Wellen. Finn lacht – Abenteuer pur!";
    }
    else if (action === "food") {
        text.innerText = "Leckeres Essen, Meeresrauschen und Sonne – perfekter Abschluss.";

    }
    setTimeout(() => nextScene(), 3000);
}

// Neustart
function restart() {
    step = 0;
    const text = document.getElementById("text");
    const scene = document.getElementById("scene");
    const choices = document.getElementById("choices");
    const progress = document.getElementById("progress");
    const bar = document.getElementById("bar");

    progress.innerText = "Start";
    bar.style.width = "0%";
    setBackground("start");

    text.innerText = "Finn steht am Flughafen – bereit für den Urlaub seines Lebens!";
    scene.innerHTML = `<img src="${finnImage}" alt="Finn">`;
    choices.innerHTML = `<button onclick="nextScene()">▶️ Starten</button>`;
}

setBackground("start");
document.getElementById("scene").innerHTML = `<img src="${finnImage}" alt="Finn">`;
document.getElementById("choices").innerHTML = `<button onclick="nextScene()">▶️ Starten</button>`;
</script>

</body>
</html>
